name: Periodic Health Check

on:
  workflow_dispatch:
  schedule:
    - cron: '*/15 * * * *'

jobs:
  health_check:
    runs-on: ubuntu-latest
    steps:
      - name: Check health endpoint
        uses: jtalk/url-health-check-action@v4
        with:
          url: https://pokedex-ci-cd-pg78.onrender.com/health
          max-attempts: 3
          retry-delay: 5s